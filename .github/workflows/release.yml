name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: sshconfig-lint
            asset_name: linux-x86_64
            package: tar
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: sshconfig-lint
            asset_name: linux-arm64
            package: tar
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_name: sshconfig-lint
            asset_name: macos-x86_64
            package: tar
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_name: sshconfig-lint
            asset_name: macos-arm64
            package: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_name: sshconfig-lint.exe
            asset_name: windows-x86_64
            package: exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Create artifact directory
        run: mkdir -p artifacts

      # ---- Unix: copy binary, chmod, package to tar.gz ----
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          out="sshconfig-lint-${{ matrix.asset_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "artifacts/${out}"
          chmod +x "artifacts/${out}"
          tar -C artifacts -czf "artifacts/${out}.tar.gz" "${out}"
          rm "artifacts/${out}"

      # ---- Windows: copy .exe (no tar) ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "sshconfig-lint-${{ matrix.asset_name }}.exe"
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.bin_name }}" "artifacts\$out"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.asset_name }}
          path: artifacts/

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts -type f -maxdepth 2 -exec mv {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
