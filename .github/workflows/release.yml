name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            output_name: sshconfig-lint
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            output_name: sshconfig-lint
          - target: x86_64-apple-darwin
            os: macos-latest
            output_name: sshconfig-lint
          - target: aarch64-apple-darwin
            os: macos-latest
            output_name: sshconfig-lint
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            output_name: sshconfig-lint.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.output_name }} artifacts/sshconfig-lint-${{ matrix.target }}
          chmod +x artifacts/sshconfig-lint-${{ matrix.target }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.output_name }} artifacts\sshconfig-lint-${{ matrix.target }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: artifacts/

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts -type f -exec mv {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
